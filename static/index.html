<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Python Driven Canvas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a2e; }
        #canvas-container { width: 100vw; height: 100vh; }
        #loading {
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%);
            color: #4fbdba; font-family: Arial; font-size: 24px;
        }
    </style>
</head>
<body>
    <div id="loading">Connecting to Python Engine...</div>
    <div id="canvas-container"></div>

<script>
// 纯渲染器 - 不存储游戏状态，只执行命令
class PixiRenderer {
    constructor() {
        this.app = new PIXI.Application({
            width: window.innerWidth,
            height: window.innerHeight,
            backgroundColor: 0x1a1a2e,
            antialias: true,
            resolution: window.devicePixelRatio || 1,
        });
        document.getElementById('canvas-container').appendChild(this.app.view);
        
        this.objects = new Map(); // id -> PIXI.DisplayObject
        this.ws = null;
        this.setupInput();
        
        // 资源缓存
        this.graphicsCache = new Map();
    }

    connect() {
        this.ws = new WebSocket(`wss://laptop-8000.moonchan.xyz/chess/ws`);
        
        this.ws.onopen = () => {
            document.getElementById('loading').style.display = 'none';
            console.log('Connected to Python Engine');
        };
        
        this.ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            this.handleCommand(data);
        };
        
        this.ws.onclose = () => {
            console.log('Disconnected');
            document.getElementById('loading').style.display = 'block';
            document.getElementById('loading').textContent = 'Disconnected. Refresh to reconnect.';
        };
    }

    handleCommand(data) {
        if (data.type === 'full_frame') {
            // 全量更新：清除并重绘
            this.clearAll();
            data.objects.forEach(obj => this.renderObject(obj));
        } 
        else if (data.type === 'delta') {
            // 增量更新：只更新变化的对象
            data.objects.forEach(obj => this.updateObject(obj));
        }
    }

    renderObject(obj) {
        const { cmd, id, params } = obj;
        let displayObj;

        switch(cmd) {
            case 'draw_rect':
                displayObj = this.createRect(params);
                break;
            case 'draw_round_rect':
                displayObj = this.createRoundRect(params);
                break;
            case 'draw_circle':
                displayObj = this.createCircle(params);
                break;
            case 'draw_text':
                displayObj = this.createText(params);
                break;
            case 'animate':
                this.animateObject(id, params);
                return;
            default:
                console.warn('Unknown command:', cmd);
                return;
        }

        if (displayObj && id) {
            // 设置层级
            displayObj.zIndex = obj.layer || 0;
            this.app.stage.addChild(displayObj);
            this.objects.set(id, displayObj);
            
            // 启用交互
            if (params.interactive) {
                displayObj.eventMode = 'static';
                displayObj.cursor = 'pointer';
            }
        }
    }

    updateObject(obj) {
        const { id, params } = obj;
        const existing = this.objects.get(id);
        
        if (!existing) {
            // 如果不存在，创建新的
            this.renderObject(obj);
            return;
        }

        // 更新属性
        if (params.x !== undefined) existing.x = params.x;
        if (params.y !== undefined) existing.y = params.y;
        if (params.alpha !== undefined) existing.alpha = params.alpha;
        if (params.color !== undefined && existing.clear) {
            existing.clear();
            existing.beginFill(this.hexToNumber(params.color));
            // 重新绘制...
        }
        
        // 更新文字内容
        if (params.text !== undefined && existing.text !== undefined) {
            existing.text = params.text;
        }
    }

    createRect(params) {
        const graphics = new PIXI.Graphics();
        graphics.beginFill(this.hexToNumber(params.color), params.alpha || 1);
        graphics.drawRect(0, 0, params.w, params.h);
        graphics.endFill();
        graphics.x = params.x;
        graphics.y = params.y;
        return graphics;
    }

    createRoundRect(params) {
        const graphics = new PIXI.Graphics();
        graphics.beginFill(this.hexToNumber(params.color));
        graphics.drawRoundedRect(0, 0, params.w, params.h, params.radius || 5);
        graphics.endFill();
        graphics.x = params.x;
        graphics.y = params.y;
        
        // 存储原始颜色用于悬停效果
        graphics.originalColor = params.color;
        graphics.hoverColor = params.hover_color;
        
        return graphics;
    }

    createCircle(params) {
        const graphics = new PIXI.Graphics();
        graphics.beginFill(this.hexToNumber(params.color), params.alpha || 1);
        graphics.drawCircle(0, 0, params.radius);
        graphics.endFill();
        graphics.x = params.x;
        graphics.y = params.y;
        return graphics;
    }

    createText(params) {
        const style = new PIXI.TextStyle({
            fontFamily: 'Arial',
            fontSize: params.style.fontSize || 16,
            fill: params.style.fill || '#ffffff',
            stroke: params.style.stroke,
            strokeThickness: params.style.strokeThickness || 0,
            align: params.style.align || 'left'
        });
        
        const text = new PIXI.Text(params.text, style);
        text.anchor.set(0.5); // 中心锚点
        text.x = params.x;
        text.y = params.y;
        return text;
    }

    animateObject(id, params) {
        const obj = this.objects.get(id);
        if (!obj) return;
        
        // 简单的缩放动画
        const originalScale = obj.scale.x;
        obj.scale.set(params.scale || 0.9);
        
        setTimeout(() => {
            obj.scale.set(originalScale);
        }, params.duration || 100);
    }

    clearAll() {
        this.app.stage.removeChildren();
        this.objects.clear();
    }

    hexToNumber(hex) {
        return parseInt(hex.replace('#', ''), 16);
    }

    setupInput() {
        // 所有输入事件都发送到Python处理
        const sendEvent = (type, data) => {
            if (this.ws && this.ws.readyState === WebSocket.OPEN) {
                this.ws.send(JSON.stringify({
                    type: type,
                    ...data,
                    timestamp: Date.now()
                }));
            }
        };

        // 鼠标事件
        this.app.stage.eventMode = 'static';
        this.app.stage.hitArea = this.app.screen;
        
        this.app.stage.on('pointerdown', (e) => {
            sendEvent('mouse_down', {
                x: e.global.x,
                y: e.global.y,
                button: e.button
            });
        });

        this.app.stage.on('pointerup', (e) => {
            sendEvent('mouse_up', {
                x: e.global.x,
                y: e.global.y
            });
        });

        this.app.stage.on('pointermove', (e) => {
            sendEvent('mouse_move', {
                x: e.global.x,
                y: e.global.y
            });
        });

        // 键盘事件
        window.addEventListener('keydown', (e) => {
            sendEvent('key_down', { key: e.key });
        });

        // 窗口大小调整
        window.addEventListener('resize', () => {
            this.app.renderer.resize(window.innerWidth, window.innerHeight);
        });
    }
}

// 启动
const renderer = new PixiRenderer();
renderer.connect();
</script>
</body>
</html>
