name: Build Binaries

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --name fastfn-linux main.py
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: fastfn-linux
        path: dist/fastfn-linux

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --name fastfn-windows.exe main.py
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: fastfn-windows
        path: dist/fastfn-windows.exe

  build-termux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    - name: Build ARM64 binary using Docker
      run: |
        docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace arm64v8/python:3.12-slim bash -c "
          apt update && apt install -y gcc python3-dev binutils file && \
          pip install pyinstaller -r requirements.txt && \
          pyinstaller --onefile --name fastfn-termux main.py && \
          file dist/fastfn-termux
        "
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: fastfn-termux
        path: dist/fastfn-termux
